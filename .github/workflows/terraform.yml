name: Terraform Checks

# Runs on every push and pull request — no secrets required.
# Catches formatting and syntax errors before they reach main.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  checks:
    name: fmt & validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        # validate only checks syntax/types — no provider calls, no credentials needed
        run: |
          terraform init -backend=false
          terraform validate
